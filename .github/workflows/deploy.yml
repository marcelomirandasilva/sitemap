name: Deploy Production (SSH)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Parar se ocorrer erro
            set -e

            # 1. Entrar na pasta do projeto
            cd /home/miranda/htdocs/genmap.app

            # 2. Garantir diretorios obrigatorios do Laravel
            mkdir -p bootstrap/cache
            chmod 775 bootstrap/cache

            # 3. Ativar modo de manutencao
            php artisan down || true

            # 4. Atualizar codigo, forcando reset para garantir integridade
            git reset --hard
            git pull origin main

            # 5. Garantir diretorios obrigatorios apos atualizar o codigo
            mkdir -p bootstrap/cache
            chmod 775 bootstrap/cache

            # 6. Instalar dependencias PHP
            composer install --no-dev --optimize-autoloader --no-interaction

            # 7. Rodar migrations
            php artisan migrate --force

            # 8. Rodar seeders de planos para garantir dados atualizados
            php artisan db:seed --class=PlanSeeder --force

            # 9. Instalar dependencias JS e gerar build do Vite
            # Nota: Em alguns servidores compartilhados, o npm pode nao estar no PATH padrao.
            # Se falhar, use o caminho completo (ex: /opt/cpanel/ea-nodejs16/bin/npm)
            npm install
            npm run build

            # 10. Limpar e recriar caches do Laravel
            php artisan optimize:clear
            php artisan config:cache
            php artisan event:cache
            php artisan route:cache
            php artisan view:cache

            # 11. Reiniciar filas
            php artisan queue:restart

            # 12. Voltar do modo de manutencao
            php artisan up

            echo "Deploy concluido com sucesso!"
